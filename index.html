<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Dashboard</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER (SMALL + CLEAN) */
header {
  display: flex;
  justify-content: space-between;
  padding: 10px 15px;
  background: #111827;
  font-size: 14px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

@media(max-width:768px){
  .container { grid-template-columns: 1fr; }
}

/* CARD */
.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  text-align: center;
}

th {
  color: #38bdf8;
}

/* FLASH */
.positive-flash { animation: greenFlash 0.8s; }
.negative-flash { animation: redFlash 0.8s; }

@keyframes greenFlash {
  0% { background: rgba(0,255,100,0.4); }
  100% { background: transparent; }
}

@keyframes redFlash {
  0% { background: rgba(255,0,0,0.4); }
  100% { background: transparent; }
}

.positive { color: #22c55e; font-weight: bold; }
.negative { color: #ef4444; font-weight: bold; }

/* USD BOX */
.usd-box {
  text-align: center;
  padding: 10px;
  background: #020617;
  border-top: 1px solid #334155;
}

</style>
</head>

<body>

<header>
  <div>📊 Market Dashboard</div>
  <div id="clock"></div>
</header>

<div class="container">

  <div class="card">
    <h3>KLC</h3>
    <table id="klcTable"></table>
  </div>

  <div class="card">
    <h3>CBOT</h3>
    <table id="cbotTable"></table>
  </div>

  <div class="card">
    <h3>CRUDE</h3>
    <table id="crudeTable"></table>
  </div>

</div>

<div class="usd-box">
  USD → INR: <span id="usd"></span>
</div>

<script>

const API = "http://localhost:3000/api/prices"; // 🔥 change to Render later

/* CLOCK */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

/* PREVIOUS DATA */
let previousData = {
  KLC: {},
  CBOT: {},
  CRUDE: {}
};

/* LOAD DATA */
async function loadData() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    console.log("DATA:", data);

    renderTable("klcTable", data.KLC, "KLC");
    renderTable("cbotTable", data.CBOT, "SOYOIL");
    renderTable("crudeTable", data.CRUDE, "CRUDE");

    document.getElementById("usd").innerText =
      data.USDINR ? data.USDINR.toFixed(2) : "-";

    previousData = data;

  } catch (err) {
    console.error("❌ API Error", err);
  }
}

/* TABLE RENDER */
function renderTable(id, dataset, prefix) {
  const table = document.getElementById(id);

  if (!dataset || Object.keys(dataset).length === 0) {
    table.innerHTML = "<tr><td colspan='3'>No Data</td></tr>";
    return;
  }

  let html = `
    <tr>
      <th>Month</th>
      <th>Price</th>
      <th>Change</th>
    </tr>
  `;

  Object.entries(dataset).forEach(([month, item]) => {

    const price = item?.price || "-";
    const change = item?.change || "-";

    const prev = previousData?.[
      id === "klcTable" ? "KLC" :
      id === "cbotTable" ? "CBOT" : "CRUDE"
    ]?.[month]?.price;

    const current = parseFloat(price);
    const previous = parseFloat(prev);

    let flash = "";

    if (!isNaN(previous) && !isNaN(current)) {
      if (current > previous) flash = "positive-flash";
      else if (current < previous) flash = "negative-flash";
    }

    const cls = parseFloat(change) >= 0 ? "positive" : "negative";

    html += `
      <tr class="${flash}">
        <td>${prefix} ${month}</td>
        <td>${price}</td>
        <td class="${cls}">${change}</td>
      </tr>
    `;
  });

  table.innerHTML = html;
}

/* INIT */
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
