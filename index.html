<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Market Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #adb3be;
    color: rgb(255, 255, 255);
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: #111827;
    position: sticky;
    top: 0;
    border-bottom: 1px solid #1f2937;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: #2c3851;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #1f2937;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #1f2937;
  }

  th {
    color: #60a5fa;
  }

  .positive-flash {
    animation: greenFlash 0.8s ease;
  }

  .negative-flash {
    animation: redFlash 0.8s ease;
  }

  @keyframes greenFlash {
    0% { background: rgb(0, 255, 94); }
    100% { background: transparent; }
  }

  @keyframes redFlash {
    0% { background: rgb(255, 0, 0); }
    100% { background: transparent; }
  }

  .positive {
    color: #00ff11;
    font-weight: bold;
  }

  .negative {
    color: #ff0404;
    font-weight: bold;
  }
</style>
</head>

<body>

<header>
  <h2>📊 Live Oil Market Dashboard</h2>
  <div id="clock" style="color: #ffffff; font-weight: bold;"></div>
</header>

<div class="container">
  <div class="card">
    <h3>KLC Market</h3>
    <table id="klcTable"></table>
  </div>

  <div class="card">
    <h3>CBOT Market</h3>
    <table id="cbotTable"></table>
  </div>

  <!-- ✅ NEW CRUDE TABLE -->
  <div class="card">
    <h3>CRUDE Market</h3>
    <table id="crudeTable"></table>
  </div>

</div>

<script>

const API = "https://cclone-commd.onrender.com/api/prices";

/* CLOCK */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

/* STORE PREVIOUS PRICES */
let previousData = {
  KLC: {},
  CBOT: {},
  CRUDE: {}   // ✅ ADDED
};

/* LOAD DATA */
async function loadData() {
  try {
    const res = await fetch(API);

    if (!res.ok) {
      throw new Error("API not responding");
    }

    const data = await res.json();

    console.log("LIVE DATA:", data);

    renderTable("klcTable", data.KLC, "KLC");
    renderTable("cbotTable", data.CBOT, "SOYOIL");
    renderTable("crudeTable", data.CRUDE, "CRUDE");

    previousData = data;

  } catch (err) {
    console.error(err);

    document.getElementById("klcTable").innerHTML =
      "<tr><td colspan='3'>❌ API Error</td></tr>";
  }
}

/* RENDER TABLE WITH FLASH */
function renderTable(id, dataset, prefix) {
  const table = document.getElementById(id);

  // 🔥 SHOW MESSAGE IF NO DATA
  if (!dataset || Object.keys(dataset).length === 0) {
    table.innerHTML = `
      <tr>
        <td colspan="3">⚠️ No Data Coming From Server</td>
      </tr>
    `;
    return;
  }

  let html = `
    <tr>
      <th>Month</th>
      <th>Price</th>
      <th>Change</th>
    </tr>
  `;

  Object.entries(dataset).forEach(([month, item]) => {

    const price = item?.price || "-";
    const change = item?.change || "-";

    // 🔥 HANDLE INVALID VALUES
    const numericChange = parseFloat(change);
    const changeClass =
      !isNaN(numericChange) && numericChange >= 0
        ? "positive"
        : "negative";

    html += `
      <tr>
        <td>${prefix} ${month}</td>
        <td>${price}</td>
        <td class="${changeClass}">${change}</td>
      </tr>
    `;
  });

  table.innerHTML = html;
}

/* INIT */
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
