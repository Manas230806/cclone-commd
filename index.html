<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Market Dashboard</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* 🔄 LOADING SCREEN */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.loader-circle {
  width: 60px;
  height: 60px;
  border: 6px solid #334155;
  border-top: 6px solid #38bdf8;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
  }
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  text-align: center;
}

th {
  color: #38bdf8;
}

tr {
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* FLASH */
.positive-flash {
  animation: greenFlash 1.23s;
}
.negative-flash {
  animation: redFlash 1.23s;
}

@keyframes greenFlash {
  0% { background: rgba(0,255,100,0.4); }
  100% { background: transparent; }
}

@keyframes redFlash {
  0% { background: rgba(255,0,0,0.4); }
  100% { background: transparent; }
}

/* COLORS */
.positive { color: #22c55e; font-weight: bold; }
.negative { color: #ef4444; font-weight: bold; }

</style>
</head>

<body>

<!-- 🔄 LOADER -->
<div id="loader">
  <div class="loader-circle"></div>
</div>

<header>
  <h2>📊 Oil Market</h2>
  <div id="clock"></div>
</header>

<div class="container">

  <div class="card">
    <h3>KLC</h3>
    <table id="klcTable"></table>
  </div>

  <div class="card">
    <h3>CBOT</h3>
    <table id="cbotTable"></table>
  </div>

  <div class="card">
    <h3>CRUDE</h3>
    <table id="crudeTable"></table>
  </div>

</div>

<script>

const API = "https://cclone-commd.onrender.com/api/prices";

/* CLOCK */
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

/* STORE PREVIOUS */
let previousData = {
  KLC: {},
  CBOT: {},
  CRUDE: {}
};

/* LOAD DATA */
async function loadData() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    console.log("FRONTEND DATA:", data);
    
    renderTable("klcTable", data.KLC, "KLC");
    renderTable("cbotTable", data.CBOT, "SOYOIL");
    renderTable("crudeTable", data.CRUDE, "CRUDE");

    previousData = data;

    // ✅ Hide loader after first load
    document.getElementById("loader").style.display = "none";

  } catch (e) {
    console.log("Error loading data");
  }
}

/* TABLE RENDER */
  function renderTable(id, dataset, prefix) {
  let html = `
    <tr>
      <th>Month</th>
      <th>Price</th>
      <th>Change</th>
    </tr>
  `;

  if (!dataset || Object.keys(dataset).length === 0) {
    document.getElementById(id).innerHTML = "<tr><td colspan='3'>No Data</td></tr>";
    return;
  }

  Object.entries(dataset).forEach(([month, item]) => {

    const price = item?.price ?? "-";
    const change = item?.change ?? "-";

    const prev = previousData?.[
      id === "klcTable" ? "KLC" :
      id === "cbotTable" ? "CBOT" : "CRUDE"
    ]?.[month]?.price;

    const current = parseFloat(price);
    const previous = parseFloat(prev);

    let flashClass = "";

    if (!isNaN(previous) && !isNaN(current)) {
      if (current > previous) flashClass = "positive-flash";
      else if (current < previous) flashClass = "negative-flash";
    }

    const changeClass = parseFloat(change) >= 0 ? "positive" : "negative";

    html += `
      <tr class="${flashClass}">
        <td>${prefix} ${month}</td>
        <td>${price}</td>
        <td class="${changeClass}">${change}</td>
      </tr>
    `;
  });

  document.getElementById(id).innerHTML = html;
}

/* INIT */
loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
